<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DOM Notes</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidepanel">
    <header class="header">
      <div class="header-text">
        <strong>Contexa</strong>
        <span>Design. Explain. Deliver.</span>
      </div>
      <div class="theme-dd" id="themeDropdown">
        <button class="theme-trigger" id="themeTrigger" title="切换主题">
          <span class="theme-trigger-dot" id="themeTriggerDot"></span>
        </button>
        <div class="theme-dd-menu" id="themeMenu">
          <div class="theme-dd-item active" data-theme="minimal">
            <span class="theme-dot" style="background: linear-gradient(135deg, #fafafa 50%, #1a1a1a 50%);"></span>
            <span>极简黑白</span>
          </div>
          <div class="theme-dd-item" data-theme="warm">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f6f0e6 50%, #25211d 50%);"></span>
            <span>暖纸复古</span>
          </div>
          <div class="theme-dd-item" data-theme="blue">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f0f4f8 50%, #2563eb 50%);"></span>
            <span>冷科技蓝</span>
          </div>
          <div class="theme-dd-item" data-theme="mint">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f0fdf4 50%, #10b981 50%);"></span>
            <span>薄荷清新</span>
          </div>
          <div class="theme-dd-item" data-theme="navy">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f1f5f9 50%, #1e40af 50%);"></span>
            <span>深蓝商务</span>
          </div>
          <div class="theme-dd-item" data-theme="rose">
            <span class="theme-dot" style="background: linear-gradient(135deg, #fef2f2 50%, #e11d48 50%);"></span>
            <span>玫瑰金</span>
          </div>
          <div class="theme-dd-item" data-theme="sand">
            <span class="theme-dot" style="background: linear-gradient(135deg, #fefce8 50%, #b45309 50%);"></span>
            <span>沙漠米色</span>
          </div>
          <div class="theme-dd-item" data-theme="ocean">
            <span class="theme-dot" style="background: linear-gradient(135deg, #ecfeff 50%, #0891b2 50%);"></span>
            <span>海洋青</span>
          </div>
          <div class="theme-dd-item" data-theme="forest">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f7fee7 50%, #166534 50%);"></span>
            <span>森林绿</span>
          </div>
          <div class="theme-dd-item" data-theme="lavender">
            <span class="theme-dot" style="background: linear-gradient(135deg, #faf5ff 50%, #7c3aed 50%);"></span>
            <span>薰衣草紫</span>
          </div>
          <div class="theme-dd-item" data-theme="sunset">
            <span class="theme-dot" style="background: linear-gradient(135deg, #fff7ed 50%, #ea580c 50%);"></span>
            <span>落日橙</span>
          </div>
          <div class="theme-dd-item" data-theme="graphite">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f9fafb 50%, #374151 50%);"></span>
            <span>石墨灰</span>
          </div>
          <div class="theme-dd-item" data-theme="coral">
            <span class="theme-dot" style="background: linear-gradient(135deg, #fff1f2 50%, #f43f5e 50%);"></span>
            <span>珊瑚粉</span>
          </div>
          <div class="theme-dd-item" data-theme="olive">
            <span class="theme-dot" style="background: linear-gradient(135deg, #f7fee7 50%, #4d7c0f 50%);"></span>
            <span>橄榄军绿</span>
          </div>
          <div class="theme-dd-item" data-theme="midnight">
            <span class="theme-dot" style="background: linear-gradient(135deg, #1e293b 50%, #38bdf8 50%);"></span>
            <span>午夜暗色</span>
          </div>
        </div>
      </div>
    </header>

    <section class="panel">
      <div id="editorEmpty" class="empty">开启标注模式后，点击页面中的元素添加备注。已有备注可点击数字标记查看或编辑。</div>
      <div id="editor" hidden>
        <p class="hint">当前绑定 DOM</p>
        <div class="selector" id="selectorText"></div>
      </div>
    </section>

    <section class="panel">
      <div class="icon-bar">
        <button class="icon-btn" data-mode="annotation" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>标注</span>
        </button>
        <button class="icon-btn" data-mode="preview" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>预览</span>
        </button>
        <button class="icon-btn" data-mode="readonly" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>只读</span>
        </button>
      </div>
    </section>


    <section class="panel" id="notesSection">
      <div id="noteList" class="note-list"></div>
      <div id="emptyState" class="empty-state">
        <p>暂无备注</p>
        <label class="btn primary" for="importJson">导入 JSON</label>
      </div>
      <div class="row" id="actionsRow">
        <div class="dd">
          <button class="btn-icon" id="clearAll" title="清空备注">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <div class="dd-menu" id="clearMenu">
            <div class="dd-item" data-scope="page">清空当前页面</div>
            <div class="dd-item danger" data-scope="all">清空全部数据</div>
          </div>
        </div>
        <div class="row-spacer"></div>
        <div class="dd">
          <button class="btn primary" id="exportJson">导出</button>
          <div class="dd-menu dd-right" id="exportMenu">
            <div class="dd-item" data-scope="page">导出当前页面</div>
            <div class="dd-item" data-scope="all">导出全部数据</div>
          </div>
        </div>
        <label class="btn" for="importJson">导入</label>
      </div>
      <input id="importJson" type="file" accept="application/json,.json">
    </section>

    <section class="panel file-note">
      <h2>本地文件支持</h2>
      <p>若要在本地 HTML 文件（file://）上使用标注功能，请前往 <a href="chrome://extensions" target="_blank">chrome://extensions</a>，找到 DOM Notes 扩展，点击"详细信息"，然后启用"允许访问文件网址"选项。</p>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
