<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DOM Notes</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidepanel">
    <header class="header">
      <strong>DOM Contexa</strong>
      <span>Design. Explain. Deliver.</span>
    </header>

    <section class="panel">
      <div id="editorEmpty" class="empty">开启标注模式后，点击页面中的元素添加备注。已有备注可点击数字标记查看或编辑。</div>
      <div id="editor" hidden>
        <p class="hint">当前绑定 DOM</p>
        <div class="selector" id="selectorText"></div>
      </div>
    </section>

    <section class="panel mode-panel">
      <div class="toggle-row">
        <div class="toggle-info">
          <strong>标注模式</strong>
          <span>开启后可点击网页元素添加标注</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="annotationToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <strong>预览模式</strong>
          <span>可正常操作网页，浏览标注信息</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="previewToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row sub-toggle" id="readOnlyRow">
        <div class="toggle-info">
          <strong>只读模式</strong>
          <span>可同时打开多个便签，不可编辑</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="readOnlyToggle" disabled>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>


    <section class="panel" id="notesSection">
      <div id="noteList" class="note-list"></div>
      <div id="emptyState" class="empty-state">
        <p>暂无备注</p>
        <label class="btn primary" for="importJson">导入 JSON</label>
      </div>
      <div class="row" id="actionsRow">
        <div class="dd">
          <button class="btn-icon" id="clearAll" title="清空备注">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <div class="dd-menu" id="clearMenu">
            <div class="dd-item" data-scope="page">清空当前页面</div>
            <div class="dd-item danger" data-scope="all">清空全部数据</div>
          </div>
        </div>
        <div class="row-spacer"></div>
        <div class="dd">
          <button class="btn primary" id="exportJson">导出</button>
          <div class="dd-menu dd-right" id="exportMenu">
            <div class="dd-item" data-scope="page">导出当前页面</div>
            <div class="dd-item" data-scope="all">导出全部数据</div>
          </div>
        </div>
        <label class="btn" for="importJson">导入</label>
      </div>
      <input id="importJson" type="file" accept="application/json,.json">
    </section>

    <section class="panel file-note">
      <h2>本地文件支持</h2>
      <p>若要在本地 HTML 文件（file://）上使用标注功能，请前往 <a href="chrome://extensions" target="_blank">chrome://extensions</a>，找到 DOM Notes 扩展，点击"详细信息"，然后启用"允许访问文件网址"选项。</p>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
